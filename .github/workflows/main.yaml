name: Cypress Tests

on: push

jobs:
  cypress-run:
    name: Cypress run
    runs-on: ubuntu-24.04
    container:
      image: rogerionk/cypress-real-world-app
      ports:
        - 3000
        - 3001
        - 3002
    steps:

      - name: 'Install OS dependencies'
        run: sudo apt-get install libgtk2.0-0 libgtk-3-0 libgbm-dev libnotify-dev libnss3 libxss1 libasound2 libxtst6 xauth xvfb

      - name: 'Browserstack setup'
        uses: browserstack/github-actions/setup-env@master
        with:
          username:  ${{ secrets.BROWSERSTACK_USERNAME }}
          access-key: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
      
      - name: 'Install dependencies'
        run: npm install

      - name: 'Run test'
        run: npm run start:bs